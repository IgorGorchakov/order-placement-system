spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ebus_users
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/ebus_users
  data:
    redis:
      host: redis
  kafka:
    bootstrap-servers: kafka:29092
